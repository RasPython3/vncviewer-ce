name: Build

on:
  push:
    branches: "*"
    tags: '*'
  pull_request:
    branches: "*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install CeGCC
      run: |
        wget https://github.com/brain-hackers/cegcc-build/releases/download/2022-10-26-225811/cegcc-x86_64-2022-10-26-225811.zip -O cegcc.zip
        unzip cegcc.zip -d /opt

    - name: Build
      id: build
      run: |
        export PATH=$PATH:/opt/cegcc/bin
        VER=$(grep -E PRODUCTVERSION res/vncviewer.rc | sed -E 's/^.* ([0-9]+),([0-9]+),([0-9]+),((?:[1-9][0-9]*)?)/\1.\2.\3.\4/g' | sed s/[.]$//g)
        make
        echo "exe=vncviewer-ce-${VER}.exe" >> $GITHUB_OUTPUT
        mv vncviewer.exe vncviewer-ce-${VER}.exe

    - name: Create release and upload assets
      uses: softprops/action-gh-release@v2
      if: github.ref_type == 'tag'
      with:
        files: |
          ${{ steps.build.outputs.exe }}
