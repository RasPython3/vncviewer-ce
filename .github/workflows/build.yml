name: Build

on:
  push:
    branches: "*"
    tags: '*'
  pull_request:
    branches: "*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install CeGCC
      run: |
        wget https://github.com/brain-hackers/cegcc-build/releases/download/2022-10-26-225811/cegcc-x86_64-2022-10-26-225811.zip -O cegcc.zip
        unzip cegcc.zip -d /opt

    - name: Build
      id: build
      run: |
        export PATH=$PATH:/opt/cegcc/bin
        VER=$(grep -E '^#define\s+VERSION\s+' version.h | sed -E 's/.+\"(.+)\"/\1/g')
        make
        echo "exe=vncviewer-ce-${VER}.exe" >> $GITHUB_OUTPUT
        cp vncviewer.exe vncviewer-ce-${VER}.exe

    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
          name: ${{ steps.build.outputs.exe }}
          path: ${{ steps.build.outputs.exe }}